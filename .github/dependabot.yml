version: 2

updates:

  # Root Maven project
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "(deps)"
    pull-request-branch-name:
      separator: "-"

  # Hello Bean module
  - package-ecosystem: "maven"
    directory: "/fundamentals/hello-bean"
    schedule:
